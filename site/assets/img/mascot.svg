<svg viewBox="0 0 300 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Golf4Less mascot">
  <defs>
    <radialGradient id="mball" cx="40%" cy="34%" r="68%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef0ec"/>
    </radialGradient>
  </defs>
  <!-- legs -->
  <rect x="118" y="232" width="16" height="60" rx="8" fill="#0e0e0e"/>
  <rect x="166" y="232" width="16" height="60" rx="8" fill="#0e0e0e"/>
  <!-- shoes -->
  <path d="M96 300c0-12 14-20 30-20h18v26H100c-2 0-4-2-4-6z" fill="#fff" stroke="#0e0e0e" stroke-width="6"/>
  <path d="M204 300c0-12-14-20-30-20h-18v26h44c2 0 4-2 4-6z" fill="#fff" stroke="#0e0e0e" stroke-width="6"/>
  <rect x="120" y="276" width="22" height="8" fill="#7ac72e"/>
  <rect x="158" y="276" width="22" height="8" fill="#7ac72e"/>
  <!-- left arm fist -->
  <path d="M92 150c-22 6-34 24-30 50" fill="none" stroke="#0e0e0e" stroke-width="14" stroke-linecap="round"/>
  <circle cx="64" cy="206" r="16" fill="#fff" stroke="#0e0e0e" stroke-width="6"/>
  <!-- right arm thumbs up -->
  <path d="M208 150c26 2 42 20 44 44" fill="none" stroke="#0e0e0e" stroke-width="14" stroke-linecap="round"/>
  <g stroke="#0e0e0e" stroke-width="6" fill="#fff">
    <rect x="240" y="150" width="34" height="40" rx="14"/>
    <path d="M250 152c0-14 6-22 14-22s10 10 8 22" />
  </g>
  <!-- ball body -->
  <circle cx="150" cy="150" r="78" fill="url(#mball)" stroke="#0e0e0e" stroke-width="7"/>
  <g fill="#0e0e0e">
    <circle cx="108" cy="138" r="3"/><circle cx="122" cy="128" r="3"/><circle cx="110" cy="158" r="3"/>
    <circle cx="124" cy="150" r="3"/><circle cx="116" cy="176" r="3"/><circle cx="132" cy="170" r="3"/>
    <circle cx="100" cy="150" r="3"/>
  </g>
  <!-- wink eye -->
  <path d="M168 134c8-8 22-8 30 0" fill="none" stroke="#0e0e0e" stroke-width="7" stroke-linecap="round"/>
  <!-- open eye -->
  <circle cx="150" cy="132" r="11" fill="#0e0e0e"/>
  <circle cx="154" cy="128" r="3.4" fill="#fff"/>
  <!-- smile -->
  <path d="M150 158c14 18 40 16 50-2-6 20-44 26-58 2z" fill="#0e0e0e"/>
  <path d="M158 168c10 8 22 8 30 0" fill="#7ac72e"/>
  <!-- cap -->
  <path d="M84 116c4-44 40-66 78-60 30 5 48 26 50 52-40-14-90-12-128 8z" fill="#0e0e0e"/>
  <path d="M212 108c26-2 50 6 58 22-30 6-64 4-92-6 10-10 22-15 34-16z" fill="#7ac72e" stroke="#0e0e0e" stroke-width="5"/>
  <text x="232" y="118" font-family="Anton, Arial Narrow, sans-serif" font-size="34" fill="#0e0e0e" text-anchor="middle">4</text>
</svg>
