<!DOCTYPE html>
<html lang="en">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0a0e0c;
    --bg2: #0f1512;
    --card: #141b17;
    --card2: #1a231d;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0f3f1;
    --muted: #7c8a82;
    --muted2: #56635b;
    --green: #30d158;
    --green-dim: #248a3d;
    --red: #ff453a;
    --amber: #ff9f0a;
    --blue: #0a84ff;
    --purple: #bf5af2;
    --mono: 'SF Mono', 'JetBrains Mono', ui-monospace, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif;
  }
  html, body { height: 100%; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    overscroll-behavior: none;
  }
  #app { height: 100vh; height: 100dvh; display: flex; flex-direction: column; }
  #content {
    flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: calc(env(safe-area-inset-top) + 14px) 16px 96px;
  }
  ::-webkit-scrollbar { width: 0; height: 0; }

  /* ── Header ── */
  .pg-head { margin-bottom: 18px; }
  .pg-eyebrow { font-family: var(--mono); font-size: 10px; letter-spacing: 0.22em; color: var(--green); text-transform: uppercase; margin-bottom: 5px; }
  .pg-title { font-size: 27px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.05; }
  .pg-sub { color: var(--muted); font-size: 13px; margin-top: 4px; }

  /* ── Cards ── */
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 18px; padding: 18px; margin-bottom: 14px;
    position: relative; overflow: hidden;
  }
  .card-lbl { font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em; color: var(--muted); text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }

  /* ── Dev Score hero ── */
  .hero {
    background: linear-gradient(150deg, #16221b 0%, #0f1713 100%);
    border: 1px solid var(--border2);
    border-radius: 22px; padding: 22px; margin-bottom: 14px; position: relative; overflow: hidden;
  }
  .hero::before { content: ''; position: absolute; top: -60px; right: -40px; width: 200px; height: 200px; background: radial-gradient(circle, rgba(48,209,88,0.13), transparent 70%); pointer-events: none; }
  .hero-row { display: flex; align-items: center; gap: 20px; }
  .ring-wrap { position: relative; width: 124px; height: 124px; flex-shrink: 0; }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .ring-score { font-size: 38px; font-weight: 800; letter-spacing: -0.03em; line-height: 1; }
  .ring-max { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 2px; letter-spacing: 0.1em; }
  .hero-meta { flex: 1; }
  .hero-grade { font-size: 15px; font-weight: 700; color: var(--green); margin-bottom: 3px; }
  .hero-pot { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.06em; }
  .hero-pot b { color: var(--text); }
  .hero-bottleneck { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
  .hero-bn-lbl { font-family: var(--mono); font-size: 9px; letter-spacing: 0.16em; color: var(--amber); text-transform: uppercase; margin-bottom: 4px; }
  .hero-bn-txt { font-size: 13px; color: var(--text); line-height: 1.4; }

  /* ── Stat grid ── */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .stat-cell { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; }
  .stat-cell .sk { font-family: var(--mono); font-size: 9px; letter-spacing: 0.14em; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
  .stat-cell .sv { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; }
  .stat-cell .sd { font-size: 11px; margin-top: 3px; font-family: var(--mono); }
  .up { color: var(--green); } .down { color: var(--red); } .flat { color: var(--muted); }

  /* ── SG bars ── */
  .sg-row { display: flex; align-items: center; gap: 10px; margin-bottom: 13px; }
  .sg-row:last-child { margin-bottom: 0; }
  .sg-name { width: 74px; font-size: 12px; font-weight: 600; flex-shrink: 0; }
  .sg-track { flex: 1; height: 7px; background: var(--card2); border-radius: 4px; position: relative; overflow: hidden; }
  .sg-mid { position: absolute; left: 50%; top: 0; bottom: 0; width: 1px; background: var(--border2); z-index: 2; }
  .sg-fill { position: absolute; top: 0; bottom: 0; border-radius: 4px; }
  .sg-val { width: 46px; text-align: right; font-family: var(--mono); font-size: 12px; font-weight: 600; flex-shrink: 0; }

  /* ── Coach card ── */
  .coach { background: linear-gradient(160deg, #1a1726 0%, #12101a 100%); border: 1px solid rgba(191,90,242,0.2); }
  .coach .card-lbl { color: var(--purple); }
  .coach-summary { font-size: 14px; line-height: 1.55; color: var(--text); }
  .coach-block { margin-top: 14px; }
  .coach-block-lbl { font-family: var(--mono); font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: 7px; }
  .ins-item { display: flex; gap: 9px; font-size: 13px; line-height: 1.4; margin-bottom: 7px; align-items: flex-start; }
  .ins-dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
  .roi-banner { margin-top: 14px; background: rgba(48,209,88,0.08); border: 1px solid rgba(48,209,88,0.2); border-radius: 12px; padding: 13px; }
  .roi-banner .rb-lbl { font-family: var(--mono); font-size: 9px; letter-spacing: 0.16em; color: var(--green); text-transform: uppercase; margin-bottom: 5px; }
  .roi-banner .rb-txt { font-size: 13px; line-height: 1.45; }
  .roi-banner .rb-gain { margin-top: 8px; font-family: var(--mono); font-size: 12px; color: var(--green); font-weight: 700; }

  /* ── Buttons ── */
  .btn { font-family: var(--sans); font-size: 15px; font-weight: 700; border: none; border-radius: 14px; padding: 15px; width: 100%; cursor: pointer; transition: transform 0.1s, opacity 0.15s; }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: var(--green); color: #04120a; }
  .btn-dark { background: var(--card2); color: var(--text); border: 1px solid var(--border2); }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-sm { padding: 9px 14px; font-size: 13px; width: auto; border-radius: 10px; }
  .btn-danger { background: rgba(255,69,58,0.12); color: var(--red); border: 1px solid rgba(255,69,58,0.25); }

  /* ── Inputs ── */
  input, select, textarea {
    font-family: var(--sans); font-size: 16px; color: var(--text);
    background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
    padding: 13px 14px; width: 100%; outline: none; transition: border 0.15s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--green-dim); }
  textarea { resize: none; min-height: 70px; }
  .field { margin-bottom: 13px; }
  .field-lbl { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; margin-bottom: 7px; display: block; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

  /* ── Chip select ── */
  .chips { display: flex; flex-wrap: wrap; gap: 7px; }
  .chip { font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em; padding: 9px 13px; border-radius: 10px; background: var(--bg2); border: 1px solid var(--border); color: var(--muted); cursor: pointer; transition: all 0.12s; text-transform: uppercase; }
  .chip.on { background: var(--green); color: #04120a; border-color: var(--green); font-weight: 700; }
  .chip.lie-on { background: var(--blue); color: #fff; border-color: var(--blue); }

  /* ── Nav ── */
  #nav {
    display: flex; background: rgba(12,17,14,0.92); backdrop-filter: blur(20px);
    border-top: 1px solid var(--border); padding: 8px 4px calc(env(safe-area-inset-bottom) + 8px);
    position: relative; z-index: 50;
  }
  .nav-btn { flex: 1; background: none; border: none; color: var(--muted2); display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 4px 0; cursor: pointer; transition: color 0.15s; }
  .nav-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; }
  .nav-btn span { font-size: 9px; font-family: var(--mono); letter-spacing: 0.08em; text-transform: uppercase; }
  .nav-btn.on { color: var(--green); }

  /* ── Tabs ── */
  .tab { display: none; }
  .tab.on { display: block; animation: fade 0.25s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  /* ── List items ── */
  .list-item { display: flex; align-items: center; gap: 13px; padding: 14px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 9px; cursor: pointer; }
  .li-badge { width: 44px; height: 44px; border-radius: 11px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 16px; flex-shrink: 0; font-family: var(--mono); }
  .li-main { flex: 1; min-width: 0; }
  .li-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .li-sub { font-size: 11px; color: var(--muted); margin-top: 2px; font-family: var(--mono); }
  .li-right { text-align: right; flex-shrink: 0; }
  .li-sg { font-family: var(--mono); font-size: 14px; font-weight: 700; }
  .li-sg-lbl { font-size: 9px; color: var(--muted); font-family: var(--mono); letter-spacing: 0.1em; }

  /* ── Empty state ── */
  .empty { text-align: center; padding: 50px 20px; }
  .empty-ic { font-size: 38px; margin-bottom: 14px; opacity: 0.5; }
  .empty-txt { color: var(--muted); font-size: 14px; line-height: 1.5; margin-bottom: 18px; }

  /* ── Modal / sheet ── */
  #sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 100; display: none; }
  #sheet-overlay.on { display: block; }
  #sheet {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 101;
    background: var(--bg2); border-top: 1px solid var(--border2);
    border-radius: 24px 24px 0 0; padding: 10px 18px calc(env(safe-area-inset-bottom) + 20px);
    max-height: 92vh; overflow-y: auto; transform: translateY(100%); transition: transform 0.32s cubic-bezier(.2,.9,.25,1);
  }
  #sheet.on { transform: translateY(0); }
  .sheet-grab { width: 38px; height: 4px; background: var(--border2); border-radius: 3px; margin: 6px auto 16px; }
  .sheet-title { font-size: 20px; font-weight: 800; margin-bottom: 4px; letter-spacing: -0.02em; }
  .sheet-sub { color: var(--muted); font-size: 13px; margin-bottom: 18px; }

  /* ── Goal / progress ── */
  .prog-track { height: 8px; background: var(--card2); border-radius: 5px; overflow: hidden; margin: 8px 0 4px; }
  .prog-fill { height: 100%; background: var(--green); border-radius: 5px; transition: width 0.5s; }
  .prog-meta { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 10px; color: var(--muted); }

  /* ── Pills / tags ── */
  .pill { display: inline-flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; padding: 4px 9px; border-radius: 7px; text-transform: uppercase; }
  .pill-green { background: rgba(48,209,88,0.13); color: var(--green); }
  .pill-red { background: rgba(255,69,58,0.13); color: var(--red); }
  .pill-amber { background: rgba(255,159,10,0.13); color: var(--amber); }

  /* ── Seg control ── */
  .seg { display: flex; background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 3px; margin-bottom: 16px; }
  .seg-btn { flex: 1; text-align: center; padding: 9px; font-size: 12px; font-weight: 600; font-family: var(--mono); letter-spacing: 0.06em; color: var(--muted); border-radius: 9px; cursor: pointer; transition: all 0.15s; text-transform: uppercase; }
  .seg-btn.on { background: var(--card2); color: var(--text); }

  /* ── Round live hole ── */
  .hole-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .hole-num { font-size: 32px; font-weight: 800; letter-spacing: -0.02em; }
  .hole-par { font-family: var(--mono); font-size: 12px; color: var(--muted); }
  .shot-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 10px; }
  .shot-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .shot-n { font-family: var(--mono); font-size: 11px; color: var(--green); letter-spacing: 0.1em; }
  .shot-sg { font-family: var(--mono); font-size: 13px; font-weight: 700; }
  .shot-desc { font-size: 13px; color: var(--muted); }
  .holenav { display: flex; gap: 8px; margin-top: 6px; }

  .divider { height: 1px; background: var(--border); margin: 18px 0; }
  .mini-lbl { font-family: var(--mono); font-size: 9px; letter-spacing: 0.16em; color: var(--muted); text-transform: uppercase; margin: 18px 0 10px; }
  .toast { position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--card2); border: 1px solid var(--border2); color: var(--text); padding: 12px 20px; border-radius: 12px; font-size: 13px; font-weight: 600; z-index: 200; opacity: 0; transition: all 0.3s; pointer-events: none; }
  .toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }
  canvas { display: block; width: 100%; }
</style>
</head>

<div id="app">
  <div id="content">

    <!-- ═══════════ HOME / COMMAND CENTER ═══════════ -->
    <div id="tab-home" class="tab on"></div>

    <!-- ═══════════ ROUNDS ═══════════ -->
    <div id="tab-rounds" class="tab"></div>

    <!-- ═══════════ STATS ═══════════ -->
    <div id="tab-stats" class="tab"></div>

    </button>
  </nav>
</div>

<div id="sheet-overlay" onclick="closeSheet()"></div>
<div id="sheet"><div class="sheet-grab"></div><div id="sheet-body"></div></div>

function blendTier(vals, hcp){ const h=Math.max(0,Math.min(20,hcp)); if(h<=10){const t=h/10;return vals[0]+t*(vals[1]-vals[0]);} const t=(h-10)/10; return vals[1]+t*(vals[2]-vals[1]); }
function expStrokes(surface, dist, hcp){
  const table = SG_BASELINES[surface]; if(!table) return 0;
  const keys = Object.keys(table).map(Number).sort((a,b)=>a-b);
  if(dist<=keys[0]) return blendTier(table[keys[0]],hcp);
  if(dist>=keys[keys.length-1]) return blendTier(table[keys[keys.length-1]],hcp);
  let lo=keys[0], hi=keys[keys.length-1];
  for(let i=0;i<keys.length-1;i++){ if(dist>=keys[i]&&dist<=keys[i+1]){lo=keys[i];hi=keys[i+1];break;} }
  const t=(dist-lo)/(hi-lo);
  const interp=[0,1,2].map(j=>table[lo][j]+t*(table[hi][j]-table[lo][j]));
  return blendTier(interp,hcp);
}
// Map a lie + on-green flag to baseline surface
function surfaceFor(lie, onGreen){
  if(onGreen) return 'putting';
  return {tee:'tee', fairway:'fairway', rough:'rough', sand:'sand', recovery:'recovery', penalty:'recovery'}[lie] || 'fairway';
}
// SG category attribution for a shot
function categoryFor(shot, par){
  if(shot.onGreen) return 'putting';
  if(shot.lie==='tee' && par>3) return 'offTee';
  if(shot.dist<=30 && !shot.onGreen) return 'aroundGreen';
  return 'approach';
}

/* Compute SG for a hole's shots. Each shot: {club,lie,dist(yds, or feet if onGreen),onGreen,penalty} ordered.
   Returns per-shot sgValue + category totals. */
function computeHoleSG(shots, par, hcp){
  const out = {offTee:0,approach:0,aroundGreen:0,putting:0,total:0,shots:[]};
  for(let i=0;i<shots.length;i++){
    const s = shots[i];
    const surf = surfaceFor(s.lie, s.onGreen);
    const startDist = s.onGreen ? s.dist : s.dist; // putting dist in feet
    let startExp;
    if(s.lie==='tee' && par>3 && !s.onGreen){
      // use tee table by hole length
      startExp = expStrokes('tee', s.dist, hcp);
    } else {
      startExp = expStrokes(surf, s.dist, hcp);
    }
    // end position = next shot's start expected, or 0 if holed
    let endExp = 0;
    const next = shots[i+1];
    if(next){
      const nsurf = surfaceFor(next.lie, next.onGreen);
      if(next.lie==='tee' && par>3 && !next.onGreen) endExp = expStrokes('tee', next.dist, hcp);
      else endExp = expStrokes(nsurf, next.dist, hcp);
    }
    const penalty = s.penalty||0;
    const sgValue = startExp - endExp - 1 - penalty;
    const cat = categoryFor(s, par);
    out[cat] += sgValue;
    out.total += sgValue;
    out.shots.push({...s, sgValue, cat, startExp});
  }
  return out;
}

/* Aggregate a full round from holes. hole:{par,yardage,shots[]} */
function computeRoundTotals(round, hcp){
  const t={offTee:0,approach:0,aroundGreen:0,putting:0,total:0,gross:0,fir:0,firPoss:0,gir:0,putts:0,birdies:0,pars:0,bogeys:0,doubles:0};
  round.holes.forEach(h=>{
    if(!h.shots || !h.shots.length) return;
    const sg = computeHoleSG(h.shots, h.par, hcp);
    t.offTee+=sg.offTee; t.approach+=sg.approach; t.aroundGreen+=sg.aroundGreen; t.putting+=sg.putting; t.total+=sg.total;
    const score = h.shots.length + h.shots.reduce((a,s)=>a+(s.penalty||0),0);
    t.gross += score;
    t.putts += h.shots.filter(s=>s.onGreen).length;
    // FIR (par>3)
    if(h.par>3){ t.firPoss++; const tee=h.shots[0]; const second=h.shots[1]; if(second && (second.lie==='fairway')) t.fir++; }
    // GIR: on green in regulation = reached green in (par-2) or fewer strokes before putting
    const greenIdx = h.shots.findIndex(s=>s.onGreen);
    if(greenIdx>=0 && greenIdx <= h.par-2) t.gir++;
    const diff = score - h.par;
    if(diff<=-1) t.birdies++; else if(diff===0) t.pars++; else if(diff===1) t.bogeys++; else if(diff>=2) t.doubles++;
  });
  return t;
}

/* ─────────── DEV SCORE ─────────── */
const avg = a => a.length? a.reduce((x,y)=>x+y,0)/a.length : 0;
const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
const normSG = (v,min,max)=>clamp(((v-min)/(max-min))*100,0,100);

function devScore(rounds, sessions){
  const get = k => rounds.map(r=>r.totals[k]).filter(v=>v!=null);
  const offTee=avg(get('offTee')), appr=avg(get('approach')), ag=avg(get('aroundGreen')), putt=avg(get('putting'));
  const sOff=normSG(offTee,-3,2), sApp=normSG(appr,-3,2), sAg=normSG(ag,-2,1.5), sPutt=normSG(putt,-2,1.5);
  // practice consistency
  let prac=0;
  if(sessions.length){
    const dates=sessions.map(s=>new Date(s.date)).sort((a,b)=>a-b);
    const weeks=Math.max((dates[dates.length-1]-dates[0])/(7*864e5),1);
    const perWeek=sessions.length/weeks;
    prac=clamp((perWeek/4)*100,0,100);
  }
  const mental = rounds.filter(r=>r.mental).map(r=>avg([r.mental.focus,r.mental.confidence,r.mental.composure]));
  const sMental = mental.length? ((avg(mental)-1)/9)*100 : 50;
  const total = clamp(sOff*0.2+sApp*0.25+sAg*0.2+sPutt*0.2+prac*0.1+sMental*0.05,0,100);
  let grade='Beginner';
  if(total>=90)grade='Elite';else if(total>=80)grade='Advanced';else if(total>=70)grade='Developing';else if(total>=60)grade='Intermediate';
  return {total:Math.round(total), grade, breakdown:{offTee:offTee,approach:appr,aroundGreen:ag,putting:putt}};
}
function potentialScore(rounds){
  const best5=k=>{const v=rounds.map(r=>r.totals[k]).filter(x=>x!=null).sort((a,b)=>b-a).slice(0,5);return avg(v);};
  const sOff=normSG(best5('offTee'),-3,2),sApp=normSG(best5('approach'),-3,2),sAg=normSG(best5('aroundGreen'),-2,1.5),sPutt=normSG(best5('putting'),-2,1.5);
  return Math.round(clamp(sOff*0.2+sApp*0.25+sAg*0.2+sPutt*0.2+100*0.1+70*0.05,0,100));
}
function bottleneck(rounds){
  const freq={offTee:0.14,approach:0.35,aroundGreen:0.25,putting:0.26};
  const names={offTee:'Off the Tee',approach:'Approach Play',aroundGreen:'Around the Green',putting:'Putting'};
  const get=k=>avg(rounds.map(r=>r.totals[k]).filter(v=>v!=null));
  let worst=null,wd=-Infinity,wsg=0;
  for(const k of Object.keys(freq)){
    const sg=get(k); const def=Math.abs(Math.min(sg,0))*freq[k];
    if(def>wd){wd=def;worst=k;wsg=sg;}
  }
  return worst?{cat:worst,name:names[worst],sgLost:wsg}:null;
}

/* AI coach for most recent round */
function lastRoundCoach(round, allRounds, prof){
  if(!round) return '';
  const t=round.totals;
  const cats=[
    {k:'offTee',n:'Driving',sg:t.offTee},
    {k:'approach',n:'Approach play',sg:t.approach},
    {k:'aroundGreen',n:'Short game',sg:t.aroundGreen},
    {k:'putting',n:'Putting',sg:t.putting},
  ];
  const sorted=[...cats].sort((a,b)=>b.sg-a.sg);
  const positives=sorted.filter(c=>c.sg>0.3).slice(0,3);
  const negatives=sorted.filter(c=>c.sg<-0.3).reverse().slice(0,3);
  // personal benchmark compare
  const hist=allRounds.slice(1,11);
  const persAvg=k=>avg(hist.map(r=>r.totals[k]));
  // ROI: worst category vs scratch(0)
  const worst=sorted[sorted.length-1];
  const gainEst=Math.abs(Math.min(worst.sg,0));
  let summary;
  if(t.total>1) summary=`Strong round — you gained ${t.total.toFixed(1)} strokes vs your baseline.`;
  else if(t.total>-2) summary=`Solid round at ${round.totals.gross}. You played close to your baseline level.`;
  else summary=`Tough round at ${round.totals.gross}, ${Math.abs(t.total).toFixed(1)} strokes below baseline — but the data shows exactly where.`;

  return `
  <div class="card coach">
    <div class="card-lbl">🧠 AI Coach · Last Round</div>
    <div class="coach-summary">${summary}</div>
    ${positives.length?`<div class="coach-block"><div class="coach-block-lbl" style="color:var(--green)">What worked</div>${positives.map(c=>`<div class="ins-item"><div class="ins-dot" style="background:var(--green)"></div><div>${c.n} gained <b>${fmtSG(c.sg)}</b> strokes</div></div>`).join('')}</div>`:''}
    ${negatives.length?`<div class="coach-block"><div class="coach-block-lbl" style="color:var(--red)">What cost you</div>${negatives.map(c=>`<div class="ins-item"><div class="ins-dot" style="background:var(--red)"></div><div>${c.n} lost <b>${fmtSG(c.sg)}</b> strokes</div></div>`).join('')}</div>`:''}
    <div class="roi-banner">
      <div class="rb-lbl">◎ Highest ROI Improvement</div>
      <div class="rb-txt">${worst.n} is your biggest leak right now. Closing it to baseline is worth real shots.</div>
      <div class="rb-gain">≈ ${gainEst.toFixed(1)} strokes/round on the table</div>
    </div>
  </div>`;
}

    <div class="divider"></div><div class="sg-row"><div class="sg-name" style="font-weight:800">TOTAL</div><div class="sg-track"></div><div class="sg-val" style="color:${totalSG>=0?'var(--green)':'var(--red)'};font-weight:800">${fmtSG(totalSG)}</div></div>
    </div>
    <div class="mini-lbl">SG Trend · Total per round</div>
    <div class="card"><canvas id="sgChart" height="160"></canvas></div>`;
    setTimeout(()=>drawTrend('sgChart', rounds.slice(0,15).reverse().map(r=>r.totals.total)),30);
  } else if(statsView==='bench'){
    const recent=k=>avg(last10.map(r=>r.totals[k]));
    // personal rolling baselines
    const roll=(k,n)=>avg(rounds.slice(0,n).map(r=>r.totals[k]));
    body.innerHTML=`
    <div class="card"><div class="card-lbl">You vs Benchmark Golfers<span>SG / round</span></div>
    <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px">
      <tr style="color:var(--muted);font-family:var(--mono);font-size:10px;text-align:right"><td style="text-align:left;padding:6px 4px">CATEGORY</td><td style="padding:6px 4px">YOU</td><td style="padding:6px 4px">SCRATCH</td><td style="padding:6px 4px">COLLEGE</td><td style="padding:6px 4px">TOUR</td></tr>
      ${cats.map(c=>{const y=recent(c.k);return `<tr style="text-align:right;border-top:1px solid var(--border)"><td style="text-align:left;padding:9px 4px;font-weight:600">${c.n}</td><td style="padding:9px 4px;font-family:var(--mono);color:${y>=0?'var(--green)':'var(--red)'};font-weight:700">${fmtSG(y)}</td><td style="padding:9px 4px;font-family:var(--mono);color:var(--muted)">+0.0</td><td style="padding:9px 4px;font-family:var(--mono);color:var(--muted)">${fmtSG(BENCHMARKS.college[c.k])}</td><td style="padding:9px 4px;font-family:var(--mono);color:var(--muted)">${fmtSG(BENCHMARKS.tour[c.k])}</td></tr>`;}).join('')}
    </table></div></div>
    <div class="card"><div class="card-lbl">Personal Baseline<span>vs your own averages</span></div>
    ${cats.map(c=>{const r5=roll(c.k,5),r10=roll(c.k,10),r20=roll(c.k,20);const d=r5-r20;return `<div class="sg-row" style="margin-bottom:16px"><div class="sg-name">${c.n}</div><div style="flex:1;display:flex;gap:14px;font-family:var(--mono);font-size:11px"><span style="color:var(--muted)">L5 <b style="color:var(--text)">${fmtSG(r5)}</b></span><span style="color:var(--muted)">L20 <b style="color:var(--text)">${fmtSG(r20)}</b></span></div><div class="sg-val" style="color:${d>=0?'var(--green)':'var(--red)'}">${d>=0?'▲':'▼'}${Math.abs(d).toFixed(2)}</div></div>`;}).join('')}
    <div style="font-size:11px;color:var(--muted);margin-top:6px;line-height:1.4">Trend = your last 5 rounds vs your last 20. Improvement is measured against yourself first.</div></div>`;
  } else {
    const last=last10;
    const firPct=avg(last.map(r=>r.totals.firPoss?r.totals.fir/r.totals.firPoss*100:0));
    const girPct=avg(last.map(r=>r.totals.gir/r.holes.length*100));
    const puttsAvg=avg(last.map(r=>r.totals.putts));
    const birdies=avg(last.map(r=>r.totals.birdies));
    body.innerHTML=`<div class="stat-grid">
      <div class="stat-cell"><div class="sk">Fairways Hit</div><div class="sv">${firPct.toFixed(0)}%</div></div>
      <div class="stat-cell"><div class="sk">Greens in Reg</div><div class="sv">${girPct.toFixed(0)}%</div></div>
      <div class="stat-cell"><div class="sk">Putts / Round</div><div class="sv">${puttsAvg.toFixed(1)}</div></div>
      <div class="stat-cell"><div class="sk">Birdies / Round</div><div class="sv">${birdies.toFixed(1)}</div></div>
    </div>
    <div class="mini-lbl">Scoring distribution · Last ${last.length}</div>
    <div class="card">${['birdies','pars','bogeys','doubles'].map(k=>{const tot=avg(last.map(r=>r.totals[k]));const lbl={birdies:'Birdies or better',pars:'Pars',bogeys:'Bogeys',doubles:'Doubles+'}[k];const col={birdies:'var(--green)',pars:'var(--blue)',bogeys:'var(--amber)',doubles:'var(--red)'}[k];return `<div class="sg-row"><div class="sg-name" style="width:120px">${lbl}</div><div class="sg-track"><div class="sg-fill" style="left:0;background:${col};width:${clamp(tot/6*100,2,100)}%"></div></div><div class="sg-val">${tot.toFixed(1)}</div></div>`;}).join('')}</div>`;
  }
}
function drawTrend(id, data){
  const c=$(id); if(!c||!data.length) return;
  const dpr=window.devicePixelRatio||1, w=c.offsetWidth, h=160;
  c.width=w*dpr; c.height=h*dpr; const x=c.getContext('2d'); x.scale(dpr,dpr);
  const pad=20, min=Math.min(...data,-1), max=Math.max(...data,1), range=max-min||1;
  const px=i=>pad+(i/(data.length-1||1))*(w-pad*2), py=v=>h-pad-((v-min)/range)*(h-pad*2);
  // zero line
  x.strokeStyle='rgba(255,255,255,0.08)'; x.lineWidth=1; x.beginPath(); x.moveTo(pad,py(0)); x.lineTo(w-pad,py(0)); x.stroke();
  // line
  x.strokeStyle='#30d158'; x.lineWidth=2.5; x.beginPath();
  data.forEach((v,i)=>{ i?x.lineTo(px(i),py(v)):x.moveTo(px(i),py(v)); }); x.stroke();
  // dots
  data.forEach((v,i)=>{ x.fillStyle=v>=0?'#30d158':'#ff453a'; x.beginPath(); x.arc(px(i),py(v),3,0,7); x.fill(); });
}

/* ─────────── RENDER: GOALS ─────────── */
function renderGoals(){
  const goals=getGoals(), rounds=getRounds(), el=$('tab-goals');
  let html=`<div class="pg-head"><div class="pg-eyebrow">Roadmap</div><div class="pg-title">Goals</div></div>
  <button class="btn btn-primary" style="margin-bottom:16px" onclick="addGoal()">＋ New Goal</button>`;
  if(!goals.length){ html+=`<div class="empty"><div class="empty-ic">🚩</div><div class="empty-txt">Set goals and Caddy auto-tracks your progress from your rounds — scoring average, fairways, SG targets, and more.</div></div>`; }
  else { html+=goals.map(g=>{const p=goalProgress(g,rounds);return `<div class="card"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px"><div style="font-size:15px;font-weight:700">${g.title}</div><span class="pill ${p.pct>=100?'pill-green':'pill-amber'}">${p.pct>=100?'✓ Hit':p.pct+'%'}</span></div><div style="font-size:12px;color:var(--muted)">${g.desc||''}</div><div class="prog-track"><div class="prog-fill" style="width:${Math.min(p.pct,100)}%"></div></div><div class="prog-meta"><span>${p.currentLabel}</span><span>Target: ${p.targetLabel}</span></div><button class="btn btn-ghost btn-sm" style="margin-top:10px" onclick="delGoal('${g.id}')">Remove</button></div>`;}).join(''); }
  el.innerHTML=html;
}
function goalProgress(g, rounds){
  const last5=rounds.slice(0,5);
  let cur=0, pct=0, currentLabel='—', targetLabel=g.target;
  if(g.metric==='score'){ cur=last5.length?avg(last5.map(r=>r.totals.gross)):0; pct=cur?clamp(100-(cur-g.target)/g.target*400,0,100):0; if(cur<=g.target)pct=100; currentLabel='Avg '+cur.toFixed(1); targetLabel='< '+g.target; }
  else if(g.metric==='fir'){ cur=last5.length?avg(last5.map(r=>r.totals.firPoss?r.totals.fir/r.totals.firPoss*100:0)):0; pct=clamp(cur/g.target*100,0,100); currentLabel=cur.toFixed(0)+'%'; targetLabel='> '+g.target+'%'; }
  else if(g.metric==='sgApproach'){ cur=last5.length?avg(last5.map(r=>r.totals.approach)):0; pct=clamp((cur-(-2))/(g.target-(-2))*100,0,100); currentLabel=fmtSG(cur); targetLabel='+ '+g.target; }
  else if(g.metric==='putts'){ cur=last5.length?avg(last5.map(r=>r.totals.putts)):0; pct=cur<=g.target?100:clamp(100-(cur-g.target)*15,0,100); currentLabel=cur.toFixed(1); targetLabel='< '+g.target; }
  return {pct:Math.round(pct), currentLabel, targetLabel};
}

/* ─────────── LIVE ROUND ─────────── */
let liveRound=null, liveHole=0;
function startRound(){
  openSheet(`<div class="sheet-title">New Round</div><div class="sheet-sub">Set up your round, then track shot by shot.</div>
  <div class="field"><label class="field-lbl">Course Name</label><input id="nr-course" placeholder="e.g. Pebble Beach"></div>
  <div class="row2"><div class="field"><label class="field-lbl">Date</label><input id="nr-date" type="date" value="${todayISO()}"></div><div class="field"><label class="field-lbl">Holes</label><select id="nr-holes"><option value="18">18 Holes</option><option value="9">9 Holes</option></select></div></div>
  <button class="btn btn-primary" onclick="beginRound()">Begin Round</button>`);
}
function beginRound(){
  const holes=parseInt($('nr-holes').value);
  liveRound={ id:uid(), course:$('nr-course').value||'Round', date:$('nr-date').value||todayISO(), ts:Date.now(),
    holes:Array.from({length:holes},(_,i)=>({par:4, yardage:400, shots:[]})) };
  liveHole=0; closeSheet(); renderLiveHole();
}
function renderLiveHole(){
  const el=$('tab-rounds'); go('rounds',document.querySelector('[data-tab=rounds]'));
  const h=liveRound.holes[liveHole];
  const prof=getProfile();
  const sgSoFar = h.shots.length? computeHoleSG(h.shots,h.par,prof.handicap):null;
  el.innerHTML=`
  <div class="pg-head"><div class="pg-eyebrow">${liveRound.course} · Live</div><div class="hole-head"><div><div class="hole-num">Hole ${liveHole+1}</div></div><div style="text-align:right"><div class="hole-par">PAR</div><div class="chips" style="margin-top:4px">${[3,4,5].map(p=>`<div class="chip ${h.par===p?'on':''}" onclick="setPar(${p})">${p}</div>`).join('')}</div></div></div></div>

  <div class="field"><label class="field-lbl">Hole Yardage</label><input id="hole-yds" type="number" inputmode="numeric" value="${h.yardage}" onchange="liveRound.holes[${liveHole}].yardage=parseInt(this.value)||400"></div>

  <div class="mini-lbl">Shots — tap ＋ to add each shot to the pin</div>
  <div id="shot-list">${h.shots.map((s,i)=>shotCardHTML(s,i)).join('')||'<div style="color:var(--muted);font-size:13px;padding:8px 0">No shots yet. Add your tee shot below.</div>'}</div>
  <button class="btn btn-dark" style="margin-top:8px" onclick="addShot()">＋ Add Shot</button>

  ${sgSoFar?`<div class="card" style="margin-top:14px"><div class="card-lbl">Hole SG (live)</div><div style="display:flex;justify-content:space-between;font-family:var(--mono);font-size:13px"><span>Score so far: <b>${h.shots.length+h.shots.reduce((a,s)=>a+(s.penalty||0),0)}</b></span><span style="color:${sgSoFar.total>=0?'var(--green)':'var(--red)'}">SG ${fmtSG(sgSoFar.total)}</span></div></div>`:''}

  <div class="holenav">
    ${liveHole>0?`<button class="btn btn-ghost" onclick="navHole(-1)">← Prev</button>`:''}
    ${liveHole<liveRound.holes.length-1?`<button class="btn btn-dark" onclick="navHole(1)">Next Hole →</button>`:`<button class="btn btn-primary" onclick="finishRound()">Finish Round ✓</button>`}
  </div>
  <button class="btn btn-ghost btn-sm" style="margin:14px auto 0;display:block" onclick="finishRound()">Finish & Save Early</button>
  `;
}
function shotCardHTML(s,i){
  const prof=getProfile();
  const lieLabel={tee:'Tee',fairway:'Fairway',rough:'Rough',sand:'Sand',recovery:'Recovery',penalty:'Penalty'}[s.lie]||s.lie;
  const dist=s.onGreen? s.dist+' ft':s.dist+' yd';
  return `<div class="shot-card"><div class="shot-head"><span class="shot-n">SHOT ${i+1}</span><span class="shot-desc">${s.onGreen?'Putt':lieLabel} · ${dist}${s.penalty?' · +'+s.penalty+'p':''}</span></div><div style="display:flex;justify-content:space-between;align-items:center"><span class="shot-desc">${s.club||''}</span><button class="btn btn-ghost btn-sm" style="padding:4px 10px" onclick="delShot(${i})">✕</button></div></div>`;
}
function setPar(p){ liveRound.holes[liveHole].par=p; renderLiveHole(); }
function navHole(d){ liveHole=clamp(liveHole+d,0,liveRound.holes.length-1); renderLiveHole(); }
function delShot(i){ liveRound.holes[liveHole].shots.splice(i,1); renderLiveHole(); }

let shotDraft=null;
function addShot(){
  const h=liveRound.holes[liveHole];
  const isFirst=h.shots.length===0;
  shotDraft={ lie:isFirst?'tee':'fairway', onGreen:false, dist:isFirst?h.yardage:150, club:'', penalty:0 };
  showShotSheet();
}
function showShotSheet(){
  const s=shotDraft;
  const lies=[['tee','Tee'],['fairway','Fairway'],['rough','Rough'],['sand','Sand'],['recovery','Recovery'],['penalty','Penalty']];
  openSheet(`<div class="sheet-title">Add Shot</div><div class="sheet-sub">Where did this shot start, and how far to the pin?</div>
  <div class="field"><label class="field-lbl">Lie / Surface</label>
    <div class="chips" id="lie-chips">${lies.map(l=>`<div class="chip ${!s.onGreen&&s.lie===l[0]?'lie-on':''}" onclick="setShotLie('${l[0]}')">${l[1]}</div>`).join('')}<div class="chip ${s.onGreen?'on':''}" onclick="setShotGreen()">On Green (Putt)</div></div>
  </div>
  <div class="field"><label class="field-lbl">Distance to Pin (${s.onGreen?'feet':'yards'})</label><input id="shot-dist" type="number" inputmode="numeric" value="${s.dist}" oninput="shotDraft.dist=parseInt(this.value)||0"></div>
  <div class="field"><label class="field-lbl">Club (optional)</label><input id="shot-club" placeholder="e.g. 7-iron" value="${s.club}" oninput="shotDraft.club=this.value"></div>
  <div class="field"><label class="field-lbl">Penalty Strokes</label><div class="chips">${[0,1,2].map(p=>`<div class="chip ${s.penalty===p?'on':''}" onclick="shotDraft.penalty=${p};showShotSheet()">${p}</div>`).join('')}</div></div>
  <button class="btn btn-primary" onclick="saveShot()">Add Shot</button>`);
}
function setShotLie(l){ shotDraft.lie=l; shotDraft.onGreen=false; if(l==='tee'&&shotDraft.dist<100)shotDraft.dist=liveRound.holes[liveHole].yardage; showShotSheet(); }
function setShotGreen(){ shotDraft.onGreen=true; shotDraft.lie='green'; if(shotDraft.dist>60)shotDraft.dist=20; showShotSheet(); }
function saveShot(){ liveRound.holes[liveHole].shots.push({...shotDraft}); closeSheet(); renderLiveHole(); }

function finishRound(){
  const prof=getProfile();
  // strip empty holes
  liveRound.holes=liveRound.holes.filter(h=>h.shots.length);
  if(!liveRound.holes.length){ toast('Add some shots first'); return; }
  liveRound.totals=computeRoundTotals(liveRound,prof.handicap);
  openSheet(`<div class="sheet-title">Round Complete</div><div class="sheet-sub">${liveRound.course} · ${liveRound.totals.gross} strokes · SG ${fmtSG(liveRound.totals.total)}</div>
  <div class="mini-lbl">Quick mental rating (optional)</div>
  <div class="field"><label class="field-lbl">Focus</label><div class="chips" id="m-focus">${[2,4,6,8,10].map(n=>`<div class="chip" onclick="setMental('focus',${n},this)">${n}</div>`).join('')}</div></div>
  <div class="field"><label class="field-lbl">Confidence</label><div class="chips" id="m-confidence">${[2,4,6,8,10].map(n=>`<div class="chip" onclick="setMental('confidence',${n},this)">${n}</div>`).join('')}</div></div>
  <div class="field"><label class="field-lbl">Composure</label><div class="chips" id="m-composure">${[2,4,6,8,10].map(n=>`<div class="chip" onclick="setMental('composure',${n},this)">${n}</div>`).join('')}</div></div>
  <div class="field"><label class="field-lbl">Round Notes</label><textarea id="r-notes" placeholder="One lesson learned..."></textarea></div>
  <button class="btn btn-primary" onclick="saveRound()">Save Round</button>`);
}
let mentalDraft={focus:6,confidence:6,composure:6};
function setMental(k,v,btn){ mentalDraft[k]=v; [...btn.parentElement.children].forEach(c=>c.classList.remove('on')); btn.classList.add('on'); }
function saveRound(){
  liveRound.mental={...mentalDraft};
  liveRound.notes=$('r-notes')?.value||'';
  const rounds=LS.get('rounds')||[]; rounds.push(liveRound); LS.set('rounds',rounds);
  closeSheet(); liveRound=null; mentalDraft={focus:6,confidence:6,composure:6};
  toast('Round saved ✓'); go('home',document.querySelector('[data-tab=home]')); renderHome();
}

  openSheet(`<div class="sheet-title">Log Practice</div><div class="sheet-sub">Track it — Caddy will tell you if it lowers your scores.</div>

  <div class="field"><label class="field-lbl">Focus Area</label><input id="p-focus" placeholder="${bn?bn.name:'e.g. wedges 60-100y'}" value="${bn?bn.name:''}"></div>
  <div class="row2"><div class="field"><label class="field-lbl">Date</label><input id="p-date" type="date" value="${todayISO()}"></div><div class="field"><label class="field-lbl">Minutes</label><input id="p-dur" type="number" inputmode="numeric" placeholder="60"></div></div>
  <div class="field"><label class="field-lbl">Quality (1-10)</label><div class="chips" id="p-qual">${[2,4,6,8,10].map((n,i)=>`<div class="chip ${i===2?'on':''}" onclick="pickChip(this,'p-qual')" data-v="${n}">${n}</div>`).join('')}</div></div>
  <div class="field"><label class="field-lbl">Notes</label><textarea id="p-notes" placeholder="Drills, results, feels..."></textarea></div>
  <button class="btn btn-primary" onclick="savePractice()">Save Session</button>`);
}
function pickChip(el,group){ [...$(group).children].forEach(c=>c.classList.remove('on')); el.classList.add('on'); }
function chipVal(group){ const on=$(group).querySelector('.on'); return on?on.dataset.v:''; }
function savePractice(){
  const s={ id:uid(), date:$('p-date').value||todayISO(), type:chipVal('p-type'), focus:$('p-focus').value||'General', duration:parseInt($('p-dur').value)||0, quality:parseInt(chipVal('p-qual'))||6, notes:$('p-notes').value||'' };
  const sessions=LS.get('sessions')||[]; sessions.push(s); LS.set('sessions',sessions);
  closeSheet(); renderPractice(); renderHome(); toast('Session logged ✓');
}
function viewSession(id){ const s=getSessions().find(x=>x.id===id); if(!s)return; openSheet(`<div class="sheet-title">${s.focus}</div><div class="sheet-sub">${fmtDate(s.date)} · ${s.type} · ${s.duration}min · Quality ${s.quality}/10</div>${s.notes?`<div class="card"><div class="card-lbl">Notes</div><div style="font-size:14px;line-height:1.5">${s.notes}</div></div>`:''}<button class="btn btn-danger" onclick="delSession('${s.id}')">Delete Session</button>`); }
function delSession(id){ let s=LS.get('sessions')||[]; s=s.filter(x=>x.id!==id); LS.set('sessions',s); closeSheet(); renderPractice(); toast('Deleted'); }

/* ─────────── GOALS ─────────── */
function addGoal(){
  const metrics=[['score','Scoring Average','Shoot under X average'],['fir','Fairways Hit %','Hit more than X% fairways'],['sgApproach','Approach SG','Gain +X on approach'],['putts','Putts per Round','Average under X putts']];
  openSheet(`<div class="sheet-title">New Goal</div><div class="sheet-sub">Caddy auto-tracks progress from your rounds.</div>
  <div class="field"><label class="field-lbl">Goal Title</label><input id="g-title" placeholder="e.g. Break 80"></div>
  <div class="field"><label class="field-lbl">Track Metric</label><div class="chips" id="g-metric">${metrics.map((m,i)=>`<div class="chip ${i===0?'on':''}" onclick="pickChip(this,'g-metric');document.getElementById('g-hint').textContent='${m[2]}'" data-v="${m[0]}">${m[1]}</div>`).join('')}</div><div id="g-hint" style="font-size:11px;color:var(--muted);margin-top:8px">Shoot under X average</div></div>
  <div class="field"><label class="field-lbl">Target Value</label><input id="g-target" type="number" inputmode="decimal" placeholder="e.g. 80"></div>
  <button class="btn btn-primary" onclick="saveGoal()">Create Goal</button>`);
}
function saveGoal(){
  const g={ id:uid(), title:$('g-title').value||'Goal', metric:chipVal('g-metric'), target:parseFloat($('g-target').value)||0 };
  const goals=LS.get('goals')||[]; goals.push(g); LS.set('goals',goals);
  closeSheet(); renderGoals(); toast('Goal created ✓');
}
function delGoal(id){ let g=LS.get('goals')||[]; g=g.filter(x=>x.id!==id); LS.set('goals',g); renderGoals(); }

/* ─────────── NAV ─────────── */
function go(tab, btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
  $('tab-'+tab).classList.add('on');
  if(btn) btn.classList.add('on');
  $('content').scrollTop=0;
  if(tab==='home')renderHome();
  if(tab==='rounds' && !liveRound)renderRounds();
  if(tab==='stats')renderStats();
  if(tab==='practice')renderPractice();
  if(tab==='goals')renderGoals();
}

/* ─────────── INIT ─────────── */
renderHome();
if('serviceWorker' in navigator){ navigator.serviceWorker.register('./sw.js').catch(()=>{}); }
</script>
</body>
</html>
